services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 15s

  recall-py:
    build: .
    ports:
      - "8766:8766"
    environment:
      RECALL_PY_OLLAMA_BASE_URL: http://ollama:11434
      RECALL_PY_DB_PATH: /data/recall-py.db
      RECALL_PY_API_LISTEN_HOST: 0.0.0.0
    volumes:
      - recall_py_data:/data
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  recall_py_data:
