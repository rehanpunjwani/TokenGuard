name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      pypi_target:
        description: "PyPI target (pypi or testpypi)"
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: none
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python pin 3.12

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        if: github.event_name == 'release' && inputs.pypi_target != 'testpypi'
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

      - name: Publish to TestPyPI
        if: inputs.pypi_target == 'testpypi'
        run: uv publish --publish-url https://test.pypi.org/legacy/ --token ${{ secrets.PYPI_TOKEN }}
